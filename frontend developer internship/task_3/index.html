<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Explorer Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">

        <h1>🌍 Country Explorer Pro</h1>

        <p>
            Search countries and explore detailed information instantly.
        </p>

    </div>

    <!-- Search Section -->
    <div class="search-box">

        <input
            type="text"
            id="country-input"
            placeholder="Search any country..."
        >

        <button id="search-btn">
            Search
        </button>

        <button id="random-btn">
            🎲 Random
        </button>

    </div>

    <!-- Search History -->
    <div class="history-section">

        <h3>🕒 Recent Searches</h3>

        <div id="history-list">

        </div>

    </div>

    <!-- Loading -->
    <div id="loading" class="loading hidden">
        Fetching country data...
    </div>

    <!-- Error -->
    <div id="error" class="error hidden">
        Country not found.
    </div>

    <!-- Country Card -->
    <div id="country-card" class="country-card hidden">

        <img
            id="flag"
            src=""
            alt="Flag"
        >

        <h2 id="country-name"></h2>

        <div class="info-grid">

            <div class="info-card">
                <h4>🏛 Capital</h4>
                <p id="capital"></p>
            </div>

            <div class="info-card">
                <h4>🌎 Region</h4>
                <p id="region"></p>
            </div>

            <div class="info-card">
                <h4>👥 Population</h4>
                <p id="population"></p>
            </div>

            <div class="info-card">
                <h4>💰 Currency</h4>
                <p id="currency"></p>
            </div>

            <div class="info-card">
                <h4>🗣 Language</h4>
                <p id="language"></p>
            </div>

            <div class="info-card">
                <h4>📌 Country Code</h4>
                <p id="country-code"></p>
            </div>

            <div class="info-card">
                <h4>📏 Area</h4>
                <p id="area"></p>
            </div>

            <div class="info-card">
                <h4>🕒 Timezone</h4>
                <p id="timezone"></p>
            </div>

        </div>

        <!-- Borders -->

        <div class="borders">

            <h3>🌐 Border Countries</h3>

            <div id="borders-list">

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
